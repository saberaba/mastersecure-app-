name: Build APK Direct
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  html-to-apk:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Convert HTML to APK
      uses: tunitis/html-to-apk@v1.0.0
      with:
        input-dir: 'www'
        app-name: 'MasterSecure'
        package-name: 'com.mastersecure.premium'

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MasterSecure-APK
        path: ./*.apk
