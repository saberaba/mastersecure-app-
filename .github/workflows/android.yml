name: Build Android APK Official

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Cordova & Create App
      run: |
        npm install -g cordova
        cordova create mon-app com.mastersecure.premium MasterSecure
        rm -rf mon-app/www/*
        cp -r www/* mon-app/www/
        
        # Injection de l'icône si images.png existe
        if [ -f mon-app/www/images.png ]; then
          sed -i '/<\/widget>/i \    <icon src="www/images.png" \/>' mon-app/config.xml
        fi

    - name: Add Android Platform & Build APK
      run: |
        cd mon-app
        cordova platform add android
        cordova build android --debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MasterSecure-APK
        path: mon-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
