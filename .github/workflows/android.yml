name: Build Android APK Official
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Cordova Lite & Setup Icon
      run: |
        npm install -g cordova
        cordova create mon-app com.mastersecure.premium MasterSecure
        rm -rf mon-app/www/*
        cp -r www/* mon-app/www/
        
        # Injection automatique de l'icône avec ton nom de fichier images.png
        if [ -f mon-app/www/images.png ]; then
          sed -i '/<\/widget>/i \    <icon src="www/images.png" \/>' mon-app/config.xml
        fi

    - name: Build APK Backend
      run: |
        cd mon-app
        cordova platform add android --no-telemetry
        cordova build android --device --no-telemetry

    - name: Upload APK Ready
      uses: actions/upload-artifact@v4
      with:
        name: MasterSecure-APK
        path: mon-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
